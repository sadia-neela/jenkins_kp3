# Use Node + Chrome image
image: markhobson/node-chrome:latest

stages:
  - setup
  - test
  - report

variables:
  LABEL: "smoke"

cache:
  paths:
    - node_modules/

install_dependencies:
  stage: setup
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

run_tests:
  stage: test
  needs:
    - install_dependencies
  variables:
    LABEL: ${LABEL}
  script:
    - echo "Running tests with LABEL=${LABEL}"
    # Chrome is already installed in the image
    - npx wdio run wdio.conf.js
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 week

generate_allure_report:
  stage: report
  needs:
    - run_tests
  script:
    - npx allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 30 days

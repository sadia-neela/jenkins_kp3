image: node:18

stages:
  - setup
  - test
  - report

variables:
  LABEL: "smoke"  # Default value, can be overridden

cache:
  paths:
    - node_modules/

# ============================================
# SETUP STAGE - Runs npm install ONLY ONCE
# ============================================
install_dependencies:
  stage: setup
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour  # Node modules don't need to persist long
  only:
    - main
    - merge_requests
    - branches

# ============================================
# TEST STAGE - Multiple tests can run in parallel
# ============================================
run_tests:
  stage: test
  needs:
    - install_dependencies  # Wait for deps, but doesn't re-run install
  variables:
    LABEL: ${LABEL}
  script:
    - echo "Running tests with LABEL=${LABEL}"
    - npx wdio run wdio.conf.js
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 week
  only:
    - main
    - merge_requests
    - branches

# ============================================
# REPORT STAGE - Generate Allure report
# ============================================
generate_allure_report:
  stage: report
  needs:
    - run_tests  # Wait for tests to complete
  script:
    - npx allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 30 days
  only:
    - main
    - merge_requests
